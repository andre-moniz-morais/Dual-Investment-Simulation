{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Sign in to Dual Investment Simulation to monitor your automated investment strategies." />
  <meta name="theme-color" content="#0B0E11" />
  <title>Sign In — Dual Investment Simulation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat+Alternates:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web@2.1.1/src/index.js" defer></script>
  <link rel="stylesheet" href="{% static 'core/css/styles.css' %}" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(240,185,11,0.12) 0%, transparent 60%),
        var(--bg-primary);
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 1rem;
      animation: fadeInUp 0.4s ease both;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo-icon {
      width: 60px;
      height: 60px;
      background: linear-gradient(135deg, var(--accent-gold), #c89a09);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.75rem;
      color: var(--bg-primary);
      margin-bottom: 0.75rem;
      box-shadow: 0 8px 32px rgba(240, 185, 11, 0.35);
    }

    .login-logo h1 {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--text-primary);
    }

    .login-logo p {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
      box-shadow: var(--shadow-elevated);
    }

    .login-card h2 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text-primary);
    }

    .form-group {
      margin-bottom: 1.25rem;
    }

    .input-icon-wrapper {
      position: relative;
    }

    .input-icon-wrapper .ph {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1.1rem;
      pointer-events: none;
    }

    .input-icon-wrapper .input-field {
      padding-left: 2.5rem;
    }

    .submit-btn {
      width: 100%;
      padding: 0.85rem;
      font-size: 1rem;
      margin-top: 0.5rem;
      justify-content: center;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="login-logo">
      <div class="login-logo-icon"><i class="ph ph-chart-line"></i></div>
      <h1>Dual <span style="color:var(--accent-gold)">Invest</span></h1>
      <p>Automated Dual Investment Simulation Platform</p>
    </div>

    <div class="login-card">
      <h2>Sign in to your account</h2>

      {% if form.errors %}
        <div class="alert alert-error" id="login-error">
          <i class="ph ph-warning-circle"></i>
          Invalid username or password. Please try again.
        </div>
      {% endif %}

      <form method="POST" action="{% url 'login' %}" id="login-form">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}" />{% endif %}

        <div class="form-group">
          <label class="form-label" for="id_username">Username</label>
          <div class="input-icon-wrapper">
            <i class="ph ph-user"></i>
            <input
              class="input-field"
              type="text"
              name="username"
              id="id_username"
              placeholder="Enter your username"
              autocomplete="username"
              required
            />
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="id_password">Password</label>
          <div class="input-icon-wrapper">
            <i class="ph ph-lock"></i>
            <input
              class="input-field"
              type="password"
              name="password"
              id="id_password"
              placeholder="Enter your password"
              autocomplete="current-password"
              required
            />
          </div>
        </div>

        <button type="submit" class="btn btn-primary submit-btn" id="login-submit">
          <i class="ph ph-sign-in"></i> Sign In
        </button>
      </form>
    </div>

    <p class="login-footer">Dual Investment Simulation &copy; 2026</p>
  </div>
</body>
</html>
