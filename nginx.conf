server {
    listen 8084;
    server_name dualinvest.andremorais.pt;

    # 1. Servir Ficheiros Estáticos Diretamente
    location /static/ {
        # Substitui pelo CAMINHO ABSOLUTO da pasta no teu Mac
        alias /Users/andremorais/Documents/GitHub/Dual-Investment-Simulation/staticfiles/;
        access_log off;
        expires 30d;
    }

    # 2. Encaminhar tráfego HTTP normal para o Django
    location / {
        proxy_pass http://127.0.0.1:8003;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}